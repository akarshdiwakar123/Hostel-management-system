<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Complaint - Hostel Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Register Complaint</h1>
            <p>Submit your complaint or feedback</p>
        </div>

        <div class="form-container">
            <form>
                <div class="form-group">
                    <label for="complaint-type">Complaint Type</label>
                    <select id="complaint-type" name="complaint-type" required>
                        <option value="">-- Select Complaint Type --</option>
                        <option value="maintenance">Room Maintenance</option>
                        <option value="electricity">Electrical Issue</option>
                        <option value="plumbing">Plumbing Issue</option>
                        <option value="cleanliness">Cleanliness</option>
                        <option value="mess">Mess Related</option>
                        <option value="internet">Internet Connectivity</option>
                        <option value="security">Security Concern</option>
                        <option value="noise">Noise Disturbance</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="priority">Priority Level</label>
                    <select id="priority" name="priority" required>
                        <option value="">-- Select Priority --</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Brief subject of your complaint" required>
                </div>

                <div class="form-group">
                    <label for="description">Detailed Description</label>
                    <textarea id="description" name="description" placeholder="Please provide detailed description of your complaint" required></textarea>
                </div>

                <div class="form-group">
                    <label for="location">Location / Room Number</label>
                    <input type="text" id="location" name="location" placeholder="Specify location where issue exists" required>
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary">Submit Complaint</button>
                    <a href="student_dashboard.html" class="btn btn-back">Cancel</a>
                </div>
            </form>
        </div>

        <div class="info-card" style="margin-top: 30px;">
            <h3>Your Previous Complaints</h3>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Subject</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>18 Jan 2025</td>
                            <td>Maintenance</td>
                            <td>Broken ceiling fan</td>
                            <td><span class="status status-resolved">Resolved</span></td>
                        </tr>
                        <tr>
                            <td>15 Jan 2025</td>
                            <td>Plumbing</td>
                            <td>Leaking tap in bathroom</td>
                            <td><span class="status status-pending">Pending</span></td>
                        </tr>
                        <tr>
                            <td>10 Jan 2025</td>
                            <td>Mess</td>
                            <td>Food quality issue</td>
                            <td><span class="status status-resolved">Resolved</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
