<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Hostel Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍🎓 Student Dashboard</h1>
            <p>Welcome back, <span id="studentName" style="color: #6366f1; font-weight: 700;">Student</span>!</p>
            <div style="margin-top: 15px;">
                <span id="currentTime" style="color: #6b7280; font-size: 0.95em;"></span>
            </div>
        </div>

        <!-- Quick Stats -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
            <div style="background: linear-gradient(135deg, #6366f1, #4f46e5); padding: 25px; border-radius: 16px; color: white; box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);">
                <div style="font-size: 0.9em; opacity: 0.9; margin-bottom: 8px;">Room Number</div>
                <div style="font-size: 2em; font-weight: 800;">A-204</div>
            </div>
            <div style="background: linear-gradient(135deg, #10b981, #059669); padding: 25px; border-radius: 16px; color: white; box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);">
                <div style="font-size: 0.9em; opacity: 0.9; margin-bottom: 8px;">Fee Status</div>
                <div style="font-size: 2em; font-weight: 800;">Paid ✓</div>
            </div>
            <div style="background: linear-gradient(135deg, #ec4899, #db2777); padding: 25px; border-radius: 16px; color: white; box-shadow: 0 4px 20px rgba(236, 72, 153, 0.3);">
                <div style="font-size: 0.9em; opacity: 0.9; margin-bottom: 8px;">Active Complaints</div>
                <div style="font-size: 2em; font-weight: 800;" id="complaintCount">1</div>
            </div>
            <div style="background: linear-gradient(135deg, #f59e0b, #d97706); padding: 25px; border-radius: 16px; color: white; box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);">
                <div style="font-size: 0.9em; opacity: 0.9; margin-bottom: 8px;">Leave Requests</div>
                <div style="font-size: 2em; font-weight: 800;" id="leaveCount">0</div>
            </div>
        </div>

        <!-- Dashboard Navigation Grid -->
        <div class="dashboard-grid">
            <div class="dashboard-card" onclick="navigateTo('student_profile.html')" data-feature="profile">
                <a href="student_profile.html">
                    <span style="font-size: 2em; margin-right: 10px;">👤</span>
                    View Profile
                </a>
            </div>

            <div class="dashboard-card" onclick="navigateTo('student_room.html')" data-feature="room">
                <a href="student_room.html">
                    <span style="font-size: 2em; margin-right: 10px;">🏠</span>
                    Room Details
                </a>
            </div>

            <div class="dashboard-card" onclick="navigateTo('student_fees.html')" data-feature="fees">
                <a href="student_fees.html">
                    <span style="font-size: 2em; margin-right: 10px;">💰</span>
                    Fee Details
                </a>
            </div>

            <div class="dashboard-card" onclick="navigateTo('student_mess.html')" data-feature="mess">
                <a href="student_mess.html">
                    <span style="font-size: 2em; margin-right: 10px;">🍽️</span>
                    Mess Menu
                </a>
            </div>

            <div class="dashboard-card" onclick="navigateTo('student_leave.html')" data-feature="leave">
                <a href="student_leave.html">
                    <span style="font-size: 2em; margin-right: 10px;">📝</span>
                    Apply Leave
                </a>
            </div>

            <div class="dashboard-card" onclick="navigateTo('student_complaint.html')" data-feature="complaint">
                <a href="student_complaint.html">
                    <span style="font-size: 2em; margin-right: 10px;">📢</span>
                    Register Complaint
                </a>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="info-card" style="margin-top: 40px;">
            <h3>📊 Recent Activity</h3>
            <div id="activityLog"></div>
        </div>

        <div class="logout-link">
            <a href="#" onclick="handleLogout(); return false;">
                🚪 Logout
            </a>
        </div>
    </div>

    <script>
        // Check authentication
        if (!localStorage.getItem('studentLoggedIn') && !sessionStorage.getItem('studentLoggedIn')) {
            window.location.href = 'student_login.html';
        }

        // Display student name
        const username = localStorage.getItem('studentUsername') || sessionStorage.getItem('studentUsername') || 'Student';
        document.getElementById('studentName').textContent = username;

        // Update current time
        function updateTime() {
            const now = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('currentTime').textContent = now.toLocaleDateString('en-US', options);
        }
        updateTime();
        setInterval(updateTime, 60000); // Update every minute

        // Navigation with animation
        function navigateTo(url) {
            event.preventDefault();
            const card = event.currentTarget;
            card.style.transform = 'scale(0.95)';
            setTimeout(() => {
                window.location.href = url;
            }, 200);
        }

        // Logout functionality
        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('studentLoggedIn');
                localStorage.removeItem('studentUsername');
                sessionStorage.removeItem('studentLoggedIn');
                sessionStorage.removeItem('studentUsername');
                
                showToast('Logged out successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            }
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span style="font-size: 1.5em;">${type === 'success' ? '✅' : '❌'}</span>
                    <span style="font-weight: 600; color: #1f2937;">${message}</span>
                </div>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.4s ease-out reverse';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Recent activity log
        const activities = [
            { icon: '✅', text: 'Fee payment completed', time: '2 days ago', color: '#10b981' },
            { icon: '📝', text: 'Leave request approved', time: '5 days ago', color: '#6366f1' },
            { icon: '🔧', text: 'Complaint resolved: Ceiling fan', time: '1 week ago', color: '#ec4899' },
            { icon: '🍽️', text: 'Mess menu updated', time: '1 week ago', color: '#f59e0b' }
        ];

        const activityHTML = activities.map(activity => `
            <div style="display: flex; align-items: center; gap: 15px; padding: 15px; margin: 10px 0; background: #f9fafb; border-radius: 12px; transition: all 0.3s ease;" 
                 onmouseover="this.style.transform='translateX(10px)'; this.style.background='#f3f4f6';" 
                 onmouseout="this.style.transform='translateX(0)'; this.style.background='#f9fafb';">
                <div style="font-size: 1.5em; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                    ${activity.icon}
                </div>
                <div style="flex: 1;">
                    <div style="font-weight: 600; color: #1f2937; margin-bottom: 4px;">${activity.text}</div>
                    <div style="font-size: 0.85em; color: #6b7280;">${activity.time}</div>
                </div>
                <div style="width: 4px; height: 40px; background: ${activity.color}; border-radius: 2px;"></div>
            </div>
        `).join('');

        document.getElementById('activityLog').innerHTML = activityHTML;

        // Add entrance animations
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.dashboard-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.5s ease-out';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 100);
            });

            // Simulate dynamic counts
            animateCount('complaintCount', 1);
            animateCount('leaveCount', 0);
        });

        function animateCount(elementId, target) {
            let current = 0;
            const element = document.getElementById(elementId);
            const interval = setInterval(() => {
                if (current <= target) {
                    element.textContent = current;
                    current++;
                } else {
                    clearInterval(interval);
                }
            }, 100);
        }
    </script>
</body>
</html>
