<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Hostel Counselling System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <svg viewBox="0 0 100 100" width="40" height="40" style="margin-right: 15px;">
            <circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="5"/>
            <path d="M 25 35 L 75 35 L 50 75 Z" fill="none" stroke="white" stroke-width="3"/>
            <text x="50" y="55" fill="white" font-size="16" font-family="Arial" text-anchor="middle">CHCS</text>
        </svg>
        <h1>College Hostel Counselling System</h1>
    </div>

    <div class="hero-section">
        <h2>Welcome to the Hostel Portal</h2>
        <p>A digital initiative facilitating Faculty, Staff, and Students to access and process hostel services at one common platform.</p>
    </div>

    <div class="cards-container">
        <a href="student_login.html" class="portal-card student">
            <div class="card-icon">
                <svg viewBox="0 0 64 64"><path d="M32 8L8 20L32 32L56 20L32 8Z M8 32v12l24 12 24-12V32" fill="#e0e0e0" stroke="#555" stroke-width="2"/><circle cx="32" cy="40" r="8" fill="#555"/></svg>
            </div>
            <div class="card-content">
                <div class="card-title">Student</div>
                <div class="login-btn">➔</div>
            </div>
        </a>

        <a href="employee_login.html" class="portal-card employee">
            <div class="card-icon">
                <svg viewBox="0 0 64 64"><circle cx="32" cy="20" r="12" fill="#ffd54f"/><path d="M12 60c0-16 12-24 20-24s20 8 20 24" fill="#cfd8dc" stroke="#555" stroke-width="2"/><path d="M30 36 l 2 20 l 2 -20 Z" fill="#e53935"/></svg>
            </div>
            <div class="card-content">
                <div class="card-title">Employee</div>
                <div class="login-btn">➔</div>
            </div>
        </a>
    </div>

    <div class="footer">
        Copyright © 2026 College Hostel Counselling System.
    </div>
</body>
</html>
