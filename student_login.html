<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Hostel Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Student Login</h1>
            <p>Enter your credentials to access the student portal</p>
        </div>

        <div class="form-container">
            <form>
                <div class="form-group">
                    <label for="username">Username / Registration Number</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <a href="student_dashboard.html" class="btn btn-primary">Enter Student Portal</a>
                </div>
            </form>

            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html" class="btn btn-back">Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
